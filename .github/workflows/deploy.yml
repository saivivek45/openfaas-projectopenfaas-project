name: OpenFaaS CI/CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: terraform init

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan (Safe)
      run: terraform plan

    - name: Skip Apply (Local Cluster)
      run: echo "Terraform apply skipped - local Minikube not accessible"

    - name: Skip OpenFaaS Deploy
      run: echo "Deployment skipped - local cluster"
